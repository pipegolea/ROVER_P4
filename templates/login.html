<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R.O.V.E.R — ASME Arena Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #030712;
    --panel:     #080f1e;
    --border:    #0f3460;
    --accent1:   #00d4ff;
    --accent2:   #ff6b35;
    --accent3:   #7fff6b;
    --text:      #c8e6ff;
    --dim:       #3a5a7a;
    --glow1:     0 0 20px rgba(0,212,255,.45);
    --glow2:     0 0 20px rgba(255,107,53,.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Grid background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPulse 8s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%,100% { opacity:.6 } 50% { opacity:1 }
  }

  /* ── Scanlines ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.15) 2px,
      rgba(0,0,0,.15) 4px
    );
    pointer-events: none;
  }

  /* ── Floating orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: float 12s ease-in-out infinite;
  }
  .orb1 { width:400px;height:400px;background:rgba(0,212,255,.08);top:-100px;left:-100px; }
  .orb2 { width:300px;height:300px;background:rgba(255,107,53,.07);bottom:-80px;right:-80px;animation-delay:-5s; }
  .orb3 { width:200px;height:200px;background:rgba(127,255,107,.06);top:50%;left:60%;animation-delay:-8s; }
  @keyframes float {
    0%,100%{transform:translate(0,0)} 33%{transform:translate(30px,-20px)} 66%{transform:translate(-20px,30px)}
  }

  /* ── Login card ── */
  .login-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 1rem;
    animation: slideIn .8s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateY(30px) }
    to   { opacity:1; transform:translateY(0) }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2.5rem 2.5rem 2rem;
    position: relative;
    box-shadow: 0 0 60px rgba(0,212,255,.08), inset 0 1px 0 rgba(0,212,255,.1);
  }
  .card::before {
    content: '';
    position: absolute; top:-1px; left:10%; right:10%; height:2px;
    background: linear-gradient(90deg, transparent, var(--accent1), transparent);
    border-radius: 0 0 4px 4px;
  }

  /* corner decorations */
  .corner {
    position: absolute; width:18px; height:18px;
    border-color: var(--accent1);
    border-style: solid;
  }
  .corner.tl { top:8px;left:8px; border-width:2px 0 0 2px; }
  .corner.tr { top:8px;right:8px; border-width:2px 2px 0 0; }
  .corner.bl { bottom:8px;left:8px; border-width:0 0 2px 2px; }
  .corner.br { bottom:8px;right:8px; border-width:0 2px 2px 0; }

  /* ── Logo / header ── */
  .logo-area { text-align:center; margin-bottom:2rem; }

  .logo-icon {
    width:72px; height:72px; margin:0 auto 1rem;
    position: relative;
    display:flex; align-items:center; justify-content:center;
  }
  .logo-ring {
    width:72px; height:72px;
    border:2px solid var(--accent1);
    border-radius:50%;
    position:absolute;
    animation: spin 8s linear infinite;
    border-top-color: transparent;
    border-right-color: transparent;
  }
  .logo-ring2 {
    width:56px; height:56px;
    border:1px solid var(--accent2);
    border-radius:50%;
    position:absolute;
    animation: spin 5s linear infinite reverse;
    border-bottom-color:transparent;
    border-left-color:transparent;
  }
  @keyframes spin { to { transform:rotate(360deg) } }
  .logo-inner {
    font-family:'Orbitron',monospace;
    font-size:.7rem; font-weight:900;
    color:var(--accent1);
    letter-spacing:.1em;
    text-shadow: var(--glow1);
    z-index:1;
  }

  .site-title {
    font-family:'Orbitron',monospace;
    font-size:1.6rem; font-weight:900;
    letter-spacing:.15em;
    color:#fff;
    text-shadow: var(--glow1);
  }
  .site-sub {
    font-family:'Share Tech Mono', monospace;
    font-size:.72rem;
    color:var(--accent2);
    letter-spacing:.3em;
    margin-top:.3rem;
    text-transform:uppercase;
  }

  /* ── Status bar ── */
  .status-bar {
    display:flex; align-items:center; gap:.5rem;
    font-family:'Share Tech Mono',monospace;
    font-size:.65rem;
    color:var(--accent3);
    margin-bottom:1.8rem;
    padding: .5rem .8rem;
    background: rgba(127,255,107,.04);
    border: 1px solid rgba(127,255,107,.15);
    border-radius:2px;
  }
  .pulse-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--accent3);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  /* ── Form ── */
  .field { margin-bottom:1.2rem; }
  label {
    display:block;
    font-family:'Share Tech Mono',monospace;
    font-size:.65rem;
    color:var(--dim);
    letter-spacing:.2em;
    text-transform:uppercase;
    margin-bottom:.4rem;
  }
  input {
    width:100%;
    padding:.7rem 1rem;
    background: rgba(0,212,255,.03);
    border: 1px solid var(--border);
    border-radius:2px;
    color:var(--text);
    font-family:'Share Tech Mono',monospace;
    font-size:.9rem;
    outline:none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus {
    border-color:var(--accent1);
    box-shadow: var(--glow1);
  }
  input::placeholder { color:var(--dim); }

  .btn-login {
    width:100%;
    padding:.85rem;
    margin-top:.5rem;
    background: transparent;
    border: 1px solid var(--accent1);
    color:var(--accent1);
    font-family:'Orbitron',monospace;
    font-size:.8rem;
    font-weight:700;
    letter-spacing:.2em;
    cursor:pointer;
    border-radius:2px;
    text-transform:uppercase;
    position:relative;
    overflow:hidden;
    transition: color .2s, box-shadow .2s;
  }
  .btn-login::before {
    content:'';
    position:absolute; inset:0;
    background:var(--accent1);
    transform:translateX(-101%);
    transition:transform .3s cubic-bezier(.16,1,.3,1);
  }
  .btn-login:hover { color:#000; box-shadow:var(--glow1); }
  .btn-login:hover::before { transform:translateX(0); }
  .btn-login span { position:relative; z-index:1; }

  .error-msg {
    margin-top:1rem;
    padding:.6rem .8rem;
    background:rgba(255,107,53,.08);
    border:1px solid rgba(255,107,53,.3);
    border-radius:2px;
    font-family:'Share Tech Mono',monospace;
    font-size:.75rem;
    color:var(--accent2);
    text-align:center;
    animation: shake .3s ease;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }

  .footer-note {
    margin-top:1.5rem;
    text-align:center;
    font-family:'Share Tech Mono',monospace;
    font-size:.6rem;
    color:var(--dim);
    letter-spacing:.1em;
  }
</style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="login-wrap">
    <div class="card">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div class="logo-area">
        <div class="logo-icon">
          <div class="logo-ring"></div>
          <div class="logo-ring2"></div>
          <div class="logo-inner">ROV</div>
        </div>
        <div class="site-title">R.O.V.E.R</div>
        <div class="site-sub">ASME Arena Challenge · Sistema de Puntaje</div>
      </div>

      <div class="status-bar">
        <div class="pulse-dot"></div>
        SISTEMA ACTIVO — ACCESO RESTRINGIDO A EQUIPOS REGISTRADOS
      </div>

      <form method="POST" action="/login">
        <div class="field">
          <label>// ID de Equipo</label>
          <input type="text" name="username" placeholder="grupo1 — grupo8" autocomplete="off" required>
        </div>
        <div class="field">
          <label>// Clave de Acceso</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button class="btn-login" type="submit"><span>Iniciar Sesión →</span></button>
      </form>

      {% if error %}
      <div class="error-msg">⚠ {{ error }}</div>
      {% endif %}

      <div class="footer-note">ASME Student Chapter · Pruebas en Arena · 2025</div>
    </div>
  </div>
</body>
</html>
